apiVersion: argoproj.io/v1alpha1
kind: Rollout
metadata:
  name: ml-sentiment-app
spec:
  replicas: 3
  selector:
    matchLabels:
      app: ml-sentiment-app
      app.kubernetes.io/name: ml-sentiment-app
      app.kubernetes.io/part-of: sentiment-analysis
      environment: production

  template:
    metadata:
      labels:
        app: ml-sentiment-app
        app.kubernetes.io/name: ml-sentiment-app
        app.kubernetes.io/part-of: sentiment-analysis
        environment: production
    spec:
      containers:
        - name: ml-sentiment-app
          image: registry.local:5000/ml-sentiment-app:latest
          ports:
            - containerPort: 8000
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "256Mi"
  strategy:
    canary:
      stableService: ml-sentiment-app
      canaryService: ml-sentiment-app-canary
      steps:
        - setWeight: 20
        - pause: {duration: 30s}
        - setWeight: 40
        - pause: {duration: 30s}
        - setWeight: 60
        - pause: {duration: 30s}
        - setWeight: 80
        - pause: {duration: 30s}
        - setWeight: 100
